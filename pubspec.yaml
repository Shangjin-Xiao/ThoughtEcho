name: mind_trace
description: 一款帮助你记录和分析思想的应用。
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  sqflite: ^2.3.2
  sqflite_common_ffi: ^2.3.2
  sqlite3_flutter_libs: ^0.5.18
  path: ^1.8.3
  path_provider: ^2.1.2
  http: ^1.2.0
  uuid: ^4.3.3
  shared_preferences: ^2.5.2
  flutter_markdown: ^0.6.23
  intl: ^0.19.0
  url_launcher: ^6.2.4
  # file_picker: ^5.5.0 # 暂时注释掉，因为与Flutter新版本不兼容
  file_selector: ^1.0.2 # 使用Flutter官方维护的文件选择器插件
  share_plus: ^7.2.1 # 用于分享文件
  # dynamic_color: ^1.6.6
  flex_color_scheme: ^7.3.1
  geolocator: ^11.1.0
  permission_handler: ^11.3.0
  flutter_secure_storage: ^9.0.0
  # 新增本地地理编码相关依赖
  geocoding: ^2.1.1 # 使用系统提供的地理编码功能
  geocode: ^1.0.3 # 轻量级地理编码包，可配合系统功能使用
  # 添加MMKV依赖，用于高效的键值存储
  mmkv: ^1.3.2
  # 使用Flutter内置的剪贴板功能(不需要额外的依赖)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

# 应用图标配置
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "icon.png"
  
# 字体配置
flutter:
  # 确保应用可以使用Material Design图标
  uses-material-design: true
  
  # 使用系统字体，不再需要额外的字体资源
  # fonts:
  #   - family: NotoSansSC
  #     fonts:
  #       - asset: assets/fonts/NotoSansSC-Regular.ttf
  #       - asset: assets/fonts/NotoSansSC-Bold.ttf
  #         weight: 700