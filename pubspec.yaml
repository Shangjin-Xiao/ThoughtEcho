name: mind_trace
description: A mind tracing app that helps you record and analyze your thoughts.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  sqflite: ^2.3.2
  sqflite_common_ffi: ^2.3.2
  sqlite3_flutter_libs: ^0.5.18
  path: ^1.8.3
  path_provider: ^2.1.2
  http: ^1.2.0
  uuid: ^4.3.3
  shared_preferences: ^2.2.2
  flutter_markdown: ^0.6.18
  intl: ^0.19.0
  url_launcher: ^6.2.4
  file_picker: ^6.1.1
  dynamic_color: ^1.7.0
  flex_color_scheme: ^7.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

fonts:
  - family: NotoSans
    fonts:
      - asset: assets/fonts/NotoSans-Regular.ttf
