<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, initial-scale=1.0">
    <title>ThoughtEcho - Pure Banner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        paperCream: '#f9f6f0',
                        inkDark: '#2c2416',
                        inkMedium: '#5a4a3a',
                        lineColor: '#d4c5b9',
                        accentBrown: '#a67c52',
                        accentOrange: '#d4895b'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'Noto Sans SC', sans-serif;
        }
        
        .font-title {
            font-family: 'ZCOOL XiaoWei', serif;
        }

        .screenshot-card {
            background: white;
            border: 3px solid #a67c52;
            border-radius: 16px;
            box-shadow: 8px 8px 0px #fff9e6, 8px 8px 0px 3px #a67c52, 12px 12px 25px rgba(0,0,0,0.12);
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="relative w-[1200px] h-[600px] bg-paperCream flex shadow-2xl rounded-lg border border-lineColor/40 overflow-hidden">
        
        <!-- 背景：官网纸质纹理与横线 -->
        <div class="absolute inset-0 pointer-events-none opacity-[0.35] z-0" 
             style="background-image: repeating-linear-gradient(0deg, transparent, transparent 32px, #d4c5b9 32px, #d4c5b9 33px), url('data:image/svg+xml,%3Csvg viewBox=\%220 0 400 400\%22 xmlns=\%22http://www.w3.org/2000/svg\%22%3E%3Cfilter id=\%22noise\%22%3E%3CfeTurbulence type=\%22fractalNoise\%22 baseFrequency=\%220.9\%22 numOctaves=\%224\%22 stitchTiles=\%22stitch\%22/%3E%3C/filter%3E%3Crect width=\%22100%25\%22 height=\%22100%25\%22 filter=\%22url(%23noise)\%22 opacity=\%220.03\%22/%3E%3C/svg%3E');">
        </div>



        <!-- 左侧：超精简核心元素 (Logo + Slogan) -->
        <div class="relative z-10 w-[45%] h-full flex flex-col justify-center px-[80px]">
            
            <div class="mb-8 group">
                <img src="./icon.png" alt="ThoughtEcho Logo" class="w-32 h-32 rounded-[28px] shadow-[4px_4px_12px_rgba(0,0,0,0.1),inset_0_0_0_1px_rgba(212,197,185,0.5)] transform -rotate-[3deg] group-hover:rotate-0 transition-transform duration-300">
            </div>

            <div class="flex flex-col gap-3 relative">
                <!-- Slogan 下方的下划线装饰 -->
                <div class="absolute left-0 bottom-[-15px] w-[120px] h-[6px] bg-accentOrange/30 rounded-full"></div>
                
                <h1 class="text-[68px] font-bold text-inkDark leading-[1.1] font-title tracking-wide whitespace-nowrap">
                    你的专属<br>灵感摘录本
                </h1>
                
                <h2 class="text-[26px] font-bold text-inkMedium leading-[1.3] font-title tracking-wider mt-2">
                    Your Personal AI-Powered<br>Inspiration Notebook
                </h2>
            </div>
            
            <div class="mt-12 flex items-center gap-3">
                <div class="w-1.5 h-1.5 rounded-full bg-accentOrange"></div>
                <div class="text-[#8b7355] font-bold tracking-[0.2em] text-[14px] uppercase">
                    Windows · Android · iOS
                </div>
            </div>
        </div>

        <!-- 右侧：多截图扇形铺开展示 -->
        <div class="absolute right-0 top-0 w-[55%] h-full z-10 pointer-events-none flex items-center justify-center">
            
            <!-- 后层左侧：笔记列表截图 -->
            <div class="absolute right-[320px] top-[90px] w-[260px] h-[520px] screenshot-card z-10 transform rotate-[-8deg] opacity-95">
                <img src="./screenshot/note_list_view.jpg" class="w-full h-full object-cover">
            </div>

            <!-- 后层右侧：年度/周期报告截图 -->
            <div class="absolute right-[40px] top-[110px] w-[250px] h-[500px] screenshot-card z-[15] transform rotate-[6deg] opacity-90">
                <img src="./screenshot/period_report.jpg" class="w-full h-full object-cover">
            </div>

            <!-- 核心前置：主页截图 -->
            <div class="absolute right-[160px] top-[50px] w-[290px] h-[580px] screenshot-card z-20 transform rotate-[-1deg]"
                 style="box-shadow: 8px 8px 0px #d4895b, 8px 8px 0px 3px #a67c52, 15px 15px 30px rgba(0,0,0,0.18);">
                <img src="./screenshot/home_page.jpg" class="w-full h-full object-cover">
            </div>

        </div>
    </div>
</body>
</html>
