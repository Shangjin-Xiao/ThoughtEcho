plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

// 加载签名配置
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}
def hasReleaseSigningConfig = [
    'storeFile',
    'storePassword',
    'keyAlias',
    'keyPassword'
].every { keystoreProperties.containsKey(it) && keystoreProperties[it] }
def releaseArtifactTaskRequested = gradle.startParameter.taskNames.any { task ->
    def taskName = task.toLowerCase()
    def simpleTaskName = taskName.tokenize(':').last()
    def packagesArtifact = taskName.contains('assemble') ||
        taskName.contains('bundle') ||
        taskName.contains('package')
    def packagesAllVariants = ['assemble', 'bundle', 'build'].contains(simpleTaskName)
    def packagesTestOnly = taskName.contains('unittest') ||
        taskName.contains('androidtest')
    def packagesDebugOnly = taskName.contains('debug') &&
        !taskName.contains('release') && !taskName.contains('profile')
    def signsReleaseArtifact = taskName.contains('sign') &&
        (taskName.contains('release') || taskName.contains('profile'))
    packagesAllVariants || (packagesArtifact &&
        !packagesTestOnly && !packagesDebugOnly) || signsReleaseArtifact
}
if (releaseArtifactTaskRequested && !hasReleaseSigningConfig) {
    throw new GradleException(
        'Release/profile builds require a complete android/key.properties signing configuration.'
    )
}


def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace "com.shangjin.thoughtecho"
    compileSdk 36
    ndkVersion "28.2.13676358"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.shangjin.thoughtecho"
        minSdkVersion 28
        targetSdkVersion 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

        // 内存和性能优化
        vectorDrawables.useSupportLibrary = true
        resConfigs "en", "zh"
    }

    flavorDimensions 'abi'

    productFlavors {
        standard64 {
            dimension 'abi'
            ndk {
                abiFilters 'arm64-v8a'
            }
            manifestPlaceholders = [
                'vmSafeMode': 'false',
                'enableSoftwareRendering': 'false',
                'enableImpeller': 'true'
            ]
        }
        arm32Compat {
            dimension 'abi'
            ndk {
                abiFilters 'armeabi-v7a'
            }
            manifestPlaceholders = [
                'vmSafeMode': 'true',
                'enableSoftwareRendering': 'true',
                'enableImpeller': 'false'
            ]
        }
    }

    signingConfigs {
        release {
            if (hasReleaseSigningConfig) {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true   // 启用代码混淆以减少APK大小
            shrinkResources true // 启用资源压缩
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'

            // 大文件处理优化
            manifestPlaceholders = [
                'enableCrashlytics': 'true'
            ]

            // 性能优化
            zipAlignEnabled true
            debuggable false
        }
        profile {
            initWith debug
            signingConfig signingConfigs.release
            applicationIdSuffix ".profile"
            debuggable false
        }
        debug {
            signingConfig signingConfigs.debug
            applicationIdSuffix ".debug"
            minifyEnabled false
            shrinkResources false
            debuggable true

            // 调试模式的内存优化
            manifestPlaceholders = [
                'enableCrashlytics': 'false'
            ]
        }
    }

    // 打包优化
    packagingOptions {
        pickFirst '**/libc++_shared.so'
        pickFirst '**/libjsc.so'
        exclude 'META-INF/DEPENDENCIES'
        exclude 'META-INF/LICENSE'
        exclude 'META-INF/LICENSE.txt'
        exclude 'META-INF/NOTICE'
        exclude 'META-INF/NOTICE.txt'
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation 'androidx.multidex:multidex:2.0.1'
    implementation 'com.tencent:mmkv:1.3.0'
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test:runner:1.3.0'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.3.0'
}
