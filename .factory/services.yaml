commands:
  install: flutter pub get
  typecheck: flutter analyze --no-fatal-infos
  build: flutter build windows
  test: flutter test test/all_tests.dart --concurrency=1
  lint: dart format --set-exit-if-changed .
  generate: dart run build_runner build --delete-conflicting-outputs
  gen-l10n: flutter gen-l10n

services:
  ollama:
    start: ollama serve
    stop: pkill ollama
    healthcheck: curl -sf http://localhost:11434/api/tags
    port: 11434
    depends_on: []
