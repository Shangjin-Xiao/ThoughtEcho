name: Build iOS IPA (No Codesign)

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: '版本名称 (例如: 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.3'
          channel: 'stable'
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Set app version
        run: |
          # 安全地修改 Info.plist 中的版本号，使用 PlistBuddy 而不是文本替换
          VERSION_NAME="${{ github.event.inputs.version_name }}"
          BUILD_NUMBER="${{ github.run_number }}"

          echo "Setting CFBundleShortVersionString to $VERSION_NAME and CFBundleVersion to $BUILD_NUMBER"

          # Set or add CFBundleShortVersionString
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION_NAME" ios/Runner/Info.plist || \
            /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string $VERSION_NAME" ios/Runner/Info.plist

          # Set or add CFBundleVersion
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" ios/Runner/Info.plist || \
            /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $BUILD_NUMBER" ios/Runner/Info.plist

          # 校验 plist 是否仍然有效
          plutil -lint ios/Runner/Info.plist

          # 显示更新后的版本信息
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" ios/Runner/Info.plist || true
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" ios/Runner/Info.plist || true

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign --build-number=${{ github.run_number }}
      - name: Archive app
        run: |
          xcodebuild -workspace ios/Runner.xcworkspace -scheme Runner -configuration Release -archivePath build/Runner.xcarchive archive
      - name: Export IPA (no signing)
        run: |
          xcodebuild -exportArchive -archivePath build/Runner.xcarchive -exportOptionsPlist ios/ExportOptions.plist -exportPath build/ipa || echo "Export may fail without valid plist, this is expected without developer account."
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: build/ipa/*.ipa
