name: Flutter发布版APK构建

on:
  # 手动触发工作流
  workflow_dispatch:
    inputs:
      version_name:
        description: '版本名称 (例如: 1.0.0)'
        required: true
        default: '1.0.0'
      build_mode:
        description: '构建模式 (debug, profile, release)'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
          - profile
      build_variant:
        description: 'Android ABI 变体 (standard64, arm32Compat, both)'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - standard64
          - arm32Compat

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: 设置 Flutter 环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: 'stable'
          cache: true
      
      - name: 准备构建环境
        run: |
          # 设置Java环境变量用于大内存构建
          echo "GRADLE_OPTS=-Xmx2g -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+UnlockExperimentalVMOptions --add-opens=java.base/java.util=ALL-UNNAMED --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.lang.invoke=ALL-UNNAMED --add-opens=java.prefs/java.util.prefs=ALL-UNNAMED --add-opens=java.base/java.nio.charset=ALL-UNNAMED --add-opens=java.base/java.net=ALL-UNNAMED --add-opens=java.base/java.util.concurrent.atomic=ALL-UNNAMED" >> $GITHUB_ENV

      - name: 验证正式签名配置
        env:
          BUILD_MODE: ${{ github.event.inputs.build_mode || 'release' }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          set -euo pipefail

          if [[ "$BUILD_MODE" == "debug" ]]; then
            echo "Debug 构建使用 Android 默认调试签名"
            exit 0
          fi

          missing_secrets=()
          for secret_name in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_PASSWORD KEY_ALIAS; do
            if [[ -z "${!secret_name:-}" ]]; then
              missing_secrets+=("$secret_name")
            fi
          done
          if (( ${#missing_secrets[@]} > 0 )); then
            echo "错误：$BUILD_MODE 构建缺少正式签名配置：${missing_secrets[*]}" >&2
            exit 1
          fi

          umask 077
          keystore_path="android/app/upload-keystore.jks"
          validation_dir="$(mktemp -d)"
          validation_keystore="$validation_dir/validation.p12"
          validation_password="$(head -c 24 /dev/urandom | base64 -w0)"
          trap 'rm -f "$validation_keystore"; rmdir "$validation_dir"' EXIT

          printf '%s' "$KEYSTORE_BASE64" | tr -d '\r\n' | base64 --decode > "$keystore_path"
          if [[ ! -s "$keystore_path" ]]; then
            echo "错误：正式签名密钥库为空" >&2
            exit 1
          fi

          keytool -list \
            -keystore "$keystore_path" \
            -storepass "$KEYSTORE_PASSWORD" \
            -alias "$KEY_ALIAS" >/dev/null
          keytool -importkeystore -noprompt \
            -srckeystore "$keystore_path" \
            -srcstorepass "$KEYSTORE_PASSWORD" \
            -srcalias "$KEY_ALIAS" \
            -srckeypass "$KEY_PASSWORD" \
            -destkeystore "$validation_keystore" \
            -deststoretype PKCS12 \
            -deststorepass "$validation_password" \
            -destkeypass "$validation_password" >/dev/null

          cat > android/key.properties << EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

          echo "正式签名配置验证通过"

      - name: 安装Flutter依赖
        run: |
          flutter --version
          flutter pub get
          bash scripts/patch_flutter_quill.sh

      - name: 静态分析
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: 构建 APK
        env:
          BUILD_MODE: ${{ github.event.inputs.build_mode || 'release' }}
          BUILD_VARIANT: ${{ github.event.inputs.build_variant || 'both' }}
          VERSION_NAME: ${{ github.event.inputs.version_name }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          # 验证 BUILD_MODE 是否合法
          if [[ "$BUILD_MODE" != "release" && "$BUILD_MODE" != "debug" && "$BUILD_MODE" != "profile" ]]; then
            echo "Error: Invalid build_mode: $BUILD_MODE"
            exit 1
          fi
          if [[ "$BUILD_VARIANT" != "both" && "$BUILD_VARIANT" != "standard64" && "$BUILD_VARIANT" != "arm32Compat" ]]; then
            echo "Error: Invalid build_variant: $BUILD_VARIANT"
            exit 1
          fi
          # 验证 VERSION_NAME 是否符合合法格式
          if [[ ! "$VERSION_NAME" =~ ^[0-9]+(\.[0-9]+)*(-[a-zA-Z0-9.-]+)?$ ]]; then
            echo "Error: Invalid version_name format: $VERSION_NAME"
            exit 1
          fi
          mkdir -p build/app/outputs/release-artifacts

          build_flavor() {
            local FLAVOR="$1"
            local TARGET_PLATFORM="$2"
            local OUTPUT_FLAVOR="${FLAVOR,,}"

            echo "正在构建 $FLAVOR ($BUILD_MODE)..."
            flutter build apk --"$BUILD_MODE" \
              --flavor "$FLAVOR" \
              --target-platform="$TARGET_PLATFORM" \
              --android-project-arg=disable-abi-filtering=true \
              --build-number="${{ github.run_number }}" \
              --build-name="$VERSION_NAME" \
              --dart-define=SENTRY_DSN="$SENTRY_DSN"

            cp "build/app/outputs/flutter-apk/app-$OUTPUT_FLAVOR-$BUILD_MODE.apk" \
              "build/app/outputs/release-artifacts/thoughtecho-$FLAVOR-$BUILD_MODE.apk"
          }

          if [[ "$BUILD_VARIANT" == "both" || "$BUILD_VARIANT" == "standard64" ]]; then
            build_flavor standard64 android-arm64
          fi
          if [[ "$BUILD_VARIANT" == "both" || "$BUILD_VARIANT" == "arm32Compat" ]]; then
            build_flavor arm32Compat android-arm
          fi

      - name: 上传 APK
        uses: actions/upload-artifact@v7
        with:
          name: app-${{ github.event.inputs.build_mode || 'release' }}-${{ github.event.inputs.build_variant || 'both' }}-apk
          path: build/app/outputs/release-artifacts/*.apk
          archive: false
          if-no-files-found: error
          retention-days: 30
