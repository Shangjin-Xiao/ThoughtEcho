name: Build Flutter APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: gradle
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          cache: true
      
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Setup Gradle
        working-directory: android
        run: |
          cat > gradle.properties << EOF
          org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
          android.useAndroidX=true
          android.enableJetifier=true
          android.enableR8=true
          EOF
          
      - name: Configure Keystore
        working-directory: android
        run: |
          cat > key.properties << EOF
          storePassword=android
          keyPassword=android
          keyAlias=key
          storeFile=key.jks
          EOF
          
      - name: Create debug keystore
        working-directory: android
        run: keytool -genkeypair -v -keystore app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          
      - name: Install Flutter dependencies
        run: flutter pub get
        
      - name: Flutter Precache
        run: |
          flutter precache --android
          flutter config --no-analytics
          flutter doctor -v
          
      - name: Install sqlite3_flutter_libs for Android
        run: |
          # 确保sqlite3_flutter_libs正确安装
          flutter pub get
          
      - name: Build APK
        run: |
          # 确保清理之前的构建
          flutter clean
          
          # 重新获取依赖并确保引擎缓存
          flutter pub get
          
          # 尝试修复Flutter引擎问题
          cd android
          ./gradlew clean
          cd ..
          
          # 尝试使用Flutter构建
          flutter build apk --release \
            --build-number=${{ github.run_number }} \
            --build-name=1.0.${{ github.run_number }} \
            --split-per-abi
            
      - name: Fallback Gradle Build (如果Flutter构建失败)
        if: ${{ failure() }}
        working-directory: android
        run: |
          # 直接使用Gradle构建
          ./gradlew assembleRelease
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
            android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
