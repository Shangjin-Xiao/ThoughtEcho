name: Build Flutter APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: gradle
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.3'  # 使用最新稳定版本
          channel: 'stable'
          cache: true
      
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Setup Gradle
        working-directory: android
        run: |
          cat > gradle.properties << EOF
          org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
          android.useAndroidX=true
          android.enableJetifier=true
          android.enableR8=true
          android.suppressUnsupportedCompileSdk=34
          EOF
          
      - name: Configure Keystore
        working-directory: android
        run: |
          cat > key.properties << EOF
          storePassword=android
          keyPassword=android
          keyAlias=key
          storeFile=key.jks
          EOF
          
      - name: Create debug keystore
        working-directory: android
        run: keytool -genkeypair -v -keystore app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          
      - name: Install Flutter dependencies
        run: flutter pub get
        
      - name: Flutter doctor
        run: flutter doctor -v
          
      - name: Build APK
        run: |
          # 清理之前的构建
          flutter clean
          
          # 重新获取依赖
          flutter pub get
          
          # 打印依赖版本
          flutter pub deps
          
          # 重置Gradle
          cd android
          chmod +x ./gradlew
          ./gradlew clean
          cd ..
          
          # 构建APK
          flutter build apk --release
            
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
