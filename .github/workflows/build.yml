name: 构建调试版APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # 允许手动触发工作流

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置Java环境
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: 设置Flutter环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true
      
      - name: 获取Flutter依赖
        run: flutter pub get
      
      - name: 修复dynamic_color插件
        run: |
          PLUGIN_DIR="$HOME/.pub-cache/hosted/pub.dev/dynamic_color-1.7.0/android"
          mkdir -p "$PLUGIN_DIR"
          cat > "$PLUGIN_DIR/build.gradle" << 'EOF'
          group 'io.material.plugins.dynamic_color'
          version '1.0'

          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }

              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.2'
              }
          }

          rootProject.allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }

          apply plugin: 'com.android.library'

          android {
              namespace 'io.material.plugins.dynamic_color'
              compileSdkVersion 34

              defaultConfig {
                  minSdkVersion 21
                  targetSdkVersion 34
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

      - name: 设置Gradle属性
        run: |
          mkdir -p android/gradle/wrapper
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-all.zip" > android/gradle/wrapper/gradle-wrapper.properties
          echo "org.gradle.jvmargs=-Xmx1536M --add-exports=java.base/sun.nio.ch=ALL-UNNAMED --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.lang.reflect=ALL-UNNAMED --add-opens=java.base/java.io=ALL-UNNAMED --add-exports=jdk.unsupported/sun.misc=ALL-UNNAMED" > android/gradle.properties
      
      - name: 设置调试签名
        run: |
          cd android/app
          keytool -genkeypair \
            -alias androiddebugkey \
            -keypass android \
            -keystore debug.keystore \
            -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000
      
      - name: 清理构建缓存
        run: |
          flutter clean
          cd android
          ./gradlew clean
      
      - name: 构建调试版APK
        run: flutter build apk --debug
      
      - name: 保存APK构建产物
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
