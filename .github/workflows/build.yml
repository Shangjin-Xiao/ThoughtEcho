name: Build Flutter APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v2

    - name: Accept Android licenses
      run: yes | sdkmanager --licenses || true

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.13.9'
        channel: 'stable'

    - name: Cache Flutter SDK
      uses: actions/cache@v3
      with:
        path: /opt/hostedtoolcache/flutter
        key: flutter-sdk-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}

    - name: Cache Pub dependencies
      uses: actions/cache@v3
      with:
        path: /flutter/.pub-cache
        key: pub-dependencies-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}

    - name: Install dependencies
      run: flutter pub get

    # 设置应用图标
    - name: Setup default app icon
      run: |
        mkdir -p android/app/src/main/res/mipmap-hdpi
        mkdir -p android/app/src/main/res/mipmap-mdpi
        mkdir -p android/app/src/main/res/mipmap-xhdpi
        mkdir -p android/app/src/main/res/mipmap-xxhdpi
        mkdir -p android/app/src/main/res/mipmap-xxxhdpi
        
        cp $FLUTTER_HOME/packages/flutter_tools/templates/app_shared/android.tmpl/template/app/src/main/res/mipmap-hdpi/ic_launcher.png android/app/src/main/res/mipmap-hdpi/
        cp $FLUTTER_HOME/packages/flutter_tools/templates/app_shared/android.tmpl/template/app/src/main/res/mipmap-mdpi/ic_launcher.png android/app/src/main/res/mipmap-mdpi/
        cp $FLUTTER_HOME/packages/flutter_tools/templates/app_shared/android.tmpl/template/app/src/main/res/mipmap-xhdpi/ic_launcher.png android/app/src/main/res/mipmap-xhdpi/
        cp $FLUTTER_HOME/packages/flutter_tools/templates/app_shared/android.tmpl/template/app/src/main/res/mipmap-xxhdpi/ic_launcher.png android/app/src/main/res/mipmap-xxhdpi/
        cp $FLUTTER_HOME/packages/flutter_tools/templates/app_shared/android.tmpl/template/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png android/app/src/main/res/mipmap-xxxhdpi/

    # 设置启动背景，修改了XML的创建方式
    - name: Setup launch background
      run: |
        mkdir -p android/app/src/main/res/drawable
        cat > android/app/src/main/res/drawable/launch_background.xml << 'EOL'
        <?xml version="1.0" encoding="utf-8"?>
        <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
            <item android:drawable="@android:color/white" />
        </layer-list>
        EOL

    - name: Build APK
      run: flutter build apk --release

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release.apk
        path: build/app/outputs/flutter-apk/app-release.apk
