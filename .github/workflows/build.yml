name: Build Flutter APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # 更新到 v4

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.9'
          channel: 'stable'

      - name: Cache Flutter SDK
        uses: actions/cache@v3
        with:
          path: /opt/hostedtoolcache/flutter
          key: flutter-sdk-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}

      - name: Cache Pub dependencies
        uses: actions/cache@v3
        with:
          path: /flutter/.pub-cache
          key: pub-dependencies-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}

      - name: Install dependencies
        run: flutter pub get

      - name: Build signed APK
        run: |
          echo ${{ secrets.KEYSTORE_FILE }} | base64 -d > android/app/my-keystore.jks
          flutter build apk --release \
            --keystore android/app/my-keystore.jks \
            --store-password ${{ secrets.KEYSTORE_PASSWORD }} \
            --alias ${{ secrets.KEY_ALIAS }} \
            --key-password ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4  # 关键修复点
        with:
          name: app-release-signed.apk
          path: build/app/outputs/flutter-apk/app-release.apk
