name: 构建调试版APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v3
      with:
        fetch-depth: 1
        # 确保文件权限被保留
        persist-credentials: false
    
    - name: 设置 Java 环境
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: gradle
    
    - name: 设置 Flutter 环境
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
        cache: true
    
    # 新增：确保Android目录存在所有必要文件
    - name: 验证Android配置
      run: |
        test -f android/gradlew || echo "gradlew文件缺失"
        test -d android/gradle || echo "gradle目录缺失"
        test -f android/gradle/wrapper/gradle-wrapper.jar || echo "wrapper.jar缺失"
        test -f android/gradle/wrapper/gradle-wrapper.properties || echo "wrapper.properties缺失"
        
    # 新增：修复权限问题
    - name: 修复权限
      run: |
        chmod +x android/gradlew
        git update-index --chmod=+x android/gradlew
        ls -la android/gradlew
        
    - name: 清理Flutter环境
      run: |
        flutter clean
        flutter doctor -v
        
    - name: 获取依赖
      run: |
        flutter pub cache repair
        flutter pub get
        
    - name: 准备Android构建
      working-directory: android
      run: |
        # 确保gradle wrapper是可执行的
        chmod +x ./gradlew
        # 显示gradle版本
        ./gradlew --version
        # 清理构建
        ./gradlew clean
      
    - name: 构建APK
      working-directory: android
      run: |
        # 使用--debug参数来获取更多构建信息
        ./gradlew assembleDebug --stacktrace --debug
        
    - name: 上传APK
      uses: actions/upload-artifact@v3
      with:
        name: debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
        retention-days: 7

    - name: 构建清理
      if: always()
      run: |
        rm -rf build
        rm -rf .dart_tool
        rm -rf .pub-cache
