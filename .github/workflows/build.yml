name: Build Flutter APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 'wrapper'
          cache-disabled: false
          cache-read-only: false
          gradle-home-cache-cleanup: true
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Configure Gradle Properties
        working-directory: android
        run: |
          cat > gradle.properties << EOF
          org.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.daemon=false
          org.gradle.parallel=true
          org.gradle.caching=true
          EOF
          
      - name: Update app/build.gradle
        working-directory: android/app
        run: |
          sed -i 's/implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:\$kotlin_version"/implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:\$kotlin_version"\n    implementation "io.flutter:flutter_embedding_debug:1.0.0-18b71d647a292a980abb405ac7d16fe1f0b20434"\n    implementation "io.flutter:flutter_embedding_profile:1.0.0-18b71d647a292a980abb405ac7d16fe1f0b20434"\n    implementation "io.flutter:flutter_embedding_release:1.0.0-18b71d647a292a980abb405ac7d16fe1f0b20434"/' build.gradle
      
      - name: Create debug keystore
        working-directory: android
        run: |
          # 确保目录存在
          mkdir -p app/src/main/jniLibs
          mkdir -p app/debug
          
          # 创建调试签名
          keytool -genkeypair -v \
            -keystore app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          
      - name: Configure Keystore Properties
        working-directory: android
        run: |
          cat > key.properties << EOF
          storePassword=android
          keyPassword=android
          keyAlias=androiddebugkey
          storeFile=app/debug.keystore
          EOF
          
      - name: Check Files
        working-directory: android
        run: |
          ls -la
          ls -la app/
          cat key.properties
          cat app/build.gradle
          
      - name: Flutter Info
        run: |
          flutter --version
          flutter doctor -v
          
      - name: Generate Files
        run: |
          flutter pub get
          cd android
          ./gradlew generateDebugSources --stacktrace
          cd ..
          
      - name: Build Debug APK
        run: |
          # 清理之前的构建
          flutter clean
          
          # 获取依赖
          flutter pub get
          
          # 给Gradle脚本增加执行权限
          cd android
          chmod +x ./gradlew
          
          # 清理并检查Gradle
          ./gradlew --no-daemon tasks --stacktrace
          ./gradlew --no-daemon clean --stacktrace
          ./gradlew --no-daemon :app:assembleDebug --stacktrace --info
          cd ..
            
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
