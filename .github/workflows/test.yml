name: Flutter CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'lib/**'
      - 'test/**'
      - 'pubspec.yaml'
      - 'analysis_options.yaml'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'lib/**'
      - 'test/**'
      - 'pubspec.yaml'
      - 'analysis_options.yaml'
      - '.github/workflows/test.yml'
  workflow_dispatch:
    inputs:
      suite:
        description: Test collection to run
        required: true
        default: gate
        type: choice
        options:
          - gate
          - integration
          - performance

permissions:
  contents: read
  checks: write

env:
  FLUTTER_VERSION: '3.44.x'

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true

    - name: Get dependencies
      run: flutter pub get

    - name: Patch flutter_quill
      run: bash scripts/patch_flutter_quill.sh

    - name: Check formatting
      run: dart format --set-exit-if-changed .

    - name: Analyze code
      run: flutter analyze --no-fatal-infos

  test-gate:
    name: Tests (${{ matrix.name }})
    if: github.event_name != 'workflow_dispatch' || inputs.suite == 'gate'
    needs: code-quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: unit 1/4
            paths: test/unit
            shard_index: 0
            total_shards: 4
          - name: unit 2/4
            paths: test/unit
            shard_index: 1
            total_shards: 4
          - name: unit 3/4
            paths: test/unit
            shard_index: 2
            total_shards: 4
          - name: unit 4/4
            paths: test/unit
            shard_index: 3
            total_shards: 4
          - name: widget 1/2
            paths: test/widget test/widgets
            shard_index: 0
            total_shards: 2
          - name: widget 2/2
            paths: test/widget test/widgets
            shard_index: 1
            total_shards: 2
          - name: legacy 1/2
            paths: test/bug_fixes test/*_test.dart
            shard_index: 0
            total_shards: 2
          - name: legacy 2/2
            paths: test/bug_fixes test/*_test.dart
            shard_index: 1
            total_shards: 2

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: stable
        cache: true

    - name: Get dependencies
      run: flutter pub get

    - name: Patch flutter_quill
      run: bash scripts/patch_flutter_quill.sh

    - name: Run shard
      run: >-
        flutter test --reporter github --timeout 90s --concurrency 1
        --shard-index=${{ matrix.shard_index }}
        --total-shards=${{ matrix.total_shards }}
        ${{ matrix.paths }}

  integration-tests:
    name: Integration Tests (manual)
    if: github.event_name == 'workflow_dispatch' && inputs.suite == 'integration'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: stable
        cache: true

    - name: Get dependencies
      run: flutter pub get

    - name: Patch flutter_quill
      run: bash scripts/patch_flutter_quill.sh

    - name: Run integration tests
      run: flutter test --reporter github --timeout 120s --concurrency 1 test/integration

  performance-tests:
    name: Performance Tests (manual)
    if: github.event_name == 'workflow_dispatch' && inputs.suite == 'performance'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: stable
        cache: true

    - name: Get dependencies
      run: flutter pub get

    - name: Patch flutter_quill
      run: bash scripts/patch_flutter_quill.sh

    - name: Run performance tests
      run: flutter test --reporter github --timeout 180s --concurrency 1 test/performance
