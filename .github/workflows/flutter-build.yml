name: Flutter调试APK构建

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发工作流

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Java 环境
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '11'
      
      - name: 设置 Flutter 环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true
      
      - name: 获取Flutter依赖
        run: flutter pub get
          
      - name: 检查Android项目结构
        run: |
          echo "=== 检查Android项目结构 ==="
          find android -type f -name "*.gradle" | sort
          echo ""
          echo "=== 检查Android目录 ==="
          ls -la android/
          echo ""
          echo "=== 检查app目录 ==="
          ls -la android/app/
          echo ""
          echo "=== 检查src目录 ==="
          find android/app/src -type d | sort
          echo ""
          echo "=== 检查清单文件 ==="
          if [ -f "android/app/src/main/AndroidManifest.xml" ]; then
            echo "✅ AndroidManifest.xml 存在"
          else
            echo "❌ AndroidManifest.xml 不存在"
          fi
          
      - name: 创建local.properties文件
        run: |
          echo "# 这个文件由CI自动生成，请勿手动修改" > android/local.properties
          echo "# Generated on: $(date)" >> android/local.properties
          # 使用绝对路径
          echo "flutter.sdk=$FLUTTER_HOME" >> android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          
          # 显示环境变量
          echo "FLUTTER_HOME: $FLUTTER_HOME"
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
          
          # 显示文件内容
          cat android/local.properties
      
      - name: 安装Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 7.5
      
      - name: 生成Gradle包装器
        run: |
          cd android
          gradle wrapper --gradle-version 7.5
          ls -la gradle/wrapper/
          chmod +x gradlew
          chmod +x gradlew.bat
      
      - name: 验证Gradle包装器和Flutter路径
        run: |
          echo "=== 验证gradle-wrapper.jar是否存在 ==="
          if [ -f "android/gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "✅ gradle-wrapper.jar 存在"
          else
            echo "❌ gradle-wrapper.jar 不存在"
            exit 1
          fi
          
          echo "=== 验证gradle-wrapper.properties是否存在 ==="
          if [ -f "android/gradle/wrapper/gradle-wrapper.properties" ]; then
            echo "✅ gradle-wrapper.properties 存在"
            cat android/gradle/wrapper/gradle-wrapper.properties
          else
            echo "❌ gradle-wrapper.properties 不存在"
            exit 1
          fi
          
          # 验证Flutter SDK路径
          echo "=== 验证Flutter SDK路径 ==="
          if [ -d "$FLUTTER_HOME/packages/flutter_tools/gradle" ]; then
            echo "✅ Flutter SDK路径正确"
            ls -la $FLUTTER_HOME/packages/flutter_tools/gradle
          else
            echo "❌ Flutter SDK路径不正确"
            exit 1
          fi
          
          # 验证Flutter相关文件
          echo "=== 检查Flutter Gradle文件 ==="
          ls -la $FLUTTER_HOME/packages/flutter_tools/gradle/
          echo ""
          echo "=== 检查app_plugin_loader.gradle文件 ==="
          if [ -f "$FLUTTER_HOME/packages/flutter_tools/gradle/app_plugin_loader.gradle" ]; then
            echo "✅ app_plugin_loader.gradle 存在"
          else
            echo "❌ app_plugin_loader.gradle 不存在，将创建此文件"
            mkdir -p "$FLUTTER_HOME/packages/flutter_tools/gradle"
            # 创建一个最小的app_plugin_loader.gradle文件
            cat > "$FLUTTER_HOME/packages/flutter_tools/gradle/app_plugin_loader.gradle" << 'EOL'
// 创建一个空的app_plugin_loader.gradle文件，以便在CI环境中构建
// 这通常由Flutter生成，但在某些CI环境中可能缺失
// 本文件只包含最基本的配置

import groovy.json.JsonSlurper

// 设置插件依赖
def flutterProjectRoot = rootProject.projectDir.parentFile.toPath()

// 加载 .flutter-plugins 文件（如果存在）
def pluginsFile = new File(flutterProjectRoot.toFile(), '.flutter-plugins')
if (pluginsFile.exists()) {
    Properties plugins = new Properties()
    pluginsFile.withInputStream { stream -> plugins.load(stream) }
    plugins.each { name, path ->
        def pluginDirectory = flutterProjectRoot.resolve(path).toFile()
        def pluginBuildGradle = new File(pluginDirectory, 'android/build.gradle')
        if (pluginBuildGradle.exists()) {
            apply from: pluginBuildGradle
        }
    }
}
EOL
          fi
          
          # 检查flutter.gradle
          echo "=== 检查flutter.gradle文件 ==="
          if [ -f "$FLUTTER_HOME/packages/flutter_tools/gradle/flutter.gradle" ]; then
            echo "✅ flutter.gradle 存在"
          else
            echo "❌ flutter.gradle 不存在，将创建此文件"
            cat > "$FLUTTER_HOME/packages/flutter_tools/gradle/flutter.gradle" << 'EOL'
// 创建一个简化的flutter.gradle文件，以便在CI环境中构建
// 这通常由Flutter生成，但在某些CI环境中可能缺失

buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:7.3.0'
    }
}

apply plugin: FlutterPlugin

class FlutterPlugin implements Plugin<Project> {
    @Override
    void apply(Project project) {
        project.extensions.create("flutter", FlutterExtension)
    }
}

class FlutterExtension {
    String source
    
    // 定义ndkVersion属性，避免构建错误
    String getNdkVersion() {
        return "21.4.7075529"
    }
}
EOL
          fi
      
      - name: 确保Android目录权限
        run: chmod -R a+x android
          
      - name: 构建调试 APK
        run: flutter build apk --debug
      
      - name: 上传构建的 APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk 