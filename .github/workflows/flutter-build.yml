name: Flutter调试APK构建

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发工作流

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Java 环境
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '11'
      
      - name: 设置 Flutter 环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true
      
      - name: 创建local.properties文件
        run: |
          echo "flutter.sdk=$FLUTTER_HOME" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
      
      - name: 安装Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 7.5
      
      - name: 生成Gradle包装器
        run: |
          cd android
          gradle wrapper --gradle-version 7.5
          ls -la gradle/wrapper/
          chmod +x gradlew
          chmod +x gradlew.bat
      
      - name: 验证Gradle包装器
        run: |
          echo "=== 验证gradle-wrapper.jar是否存在 ==="
          if [ -f "android/gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "✅ gradle-wrapper.jar 存在"
          else
            echo "❌ gradle-wrapper.jar 不存在"
            exit 1
          fi
          
          echo "=== 验证gradle-wrapper.properties是否存在 ==="
          if [ -f "android/gradle/wrapper/gradle-wrapper.properties" ]; then
            echo "✅ gradle-wrapper.properties 存在"
            cat android/gradle/wrapper/gradle-wrapper.properties
          else
            echo "❌ gradle-wrapper.properties 不存在"
            exit 1
          fi
      
      - name: 获取依赖
        run: flutter pub get
      
      - name: 确保Android目录权限
        run: chmod -R a+x android
          
      - name: 构建调试 APK
        run: flutter build apk --debug
      
      - name: 上传构建的 APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk 