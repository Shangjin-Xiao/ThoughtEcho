name: Flutter调试APK构建

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Java 环境
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17' # 升级到 Java 17

      - name: 设置 Flutter 环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.3'  # 指定具体的Flutter版本
          channel: 'stable'
          cache: true
      
      - name: 准备构建环境
        run: |
          cat > gradle.properties << EOF
          org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
          android.useAndroidX=true
          android.enableJetifier=true
          android.enableR8=true
          EOF
          
      - name: Configure Keystore
        working-directory: android
        run: |
          cat > key.properties << EOF
          storePassword=android
          keyPassword=android
          keyAlias=key
          storeFile=key.jks
          EOF
          
      - name: Create debug keystore
        working-directory: android
        run: |
          keytool -genkeypair -v \
            -keystore app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          
      - name: Install Flutter dependencies
        run: |
          flutter --version
          flutter doctor -v
          flutter pub get
        
      - name: Install sqlite3_flutter_libs for Android
        run: |
          flutter pub get
          flutter pub upgrade sqlite3_flutter_libs
          cat > gradle.properties << EOF
          org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
          android.useAndroidX=true
          android.enableJetifier=true
          android.enableR8=true
          EOF
          
      - name: Configure Keystore
        working-directory: android
        run: |
          cat > key.properties << EOF
          storePassword=android
          keyPassword=android
          keyAlias=key
          storeFile=key.jks
          EOF
          
      - name: Create debug keystore
        working-directory: android
        run: |
          keytool -genkeypair -v \
            -keystore app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          
      - name: Install Flutter dependencies
        run: |
          flutter --version
          flutter doctor -v
          flutter pub get
        
      - name: Install sqlite3_flutter_libs for Android
        run: |
          flutter pub get
          flutter pub upgrade sqlite3_flutter_libs
          
          # 下载最新的 gradle-wrapper.jar
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/master/gradle/wrapper/gradle-wrapper.jar
          echo "Gradle wrapper download output:"
          ls -la gradle/wrapper/gradle-wrapper.jar
          
          chmod +x gradlew
      - name: 构建调试 APK
        run: |
          flutter clean
          flutter build apk --release \
            --build-number=${{ github.run_number }} \
            --build-name=1.0.${{ github.run_number }}
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
