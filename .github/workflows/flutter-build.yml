name: Flutter调试APK构建

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发工作流

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Java 环境
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '11'
      
      - name: 设置 Flutter 环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true
      
      - name: 获取Flutter依赖
        run: flutter pub get
          
      - name: 检查Android项目结构
        run: |
          echo "=== 检查Android项目结构 ==="
          find android -type f -name "*.gradle" | sort
          echo ""
          echo "=== 检查Android目录 ==="
          ls -la android/
          echo ""
          echo "=== 检查app目录 ==="
          ls -la android/app/
          echo ""
          echo "=== 检查src目录 ==="
          find android/app/src -type d | sort
          echo ""
          echo "=== 检查清单文件 ==="
          if [ -f "android/app/src/main/AndroidManifest.xml" ]; then
            echo "✅ AndroidManifest.xml 存在"
          else
            echo "❌ AndroidManifest.xml 不存在"
          fi
          
      - name: 创建local.properties文件
        run: |
          echo "# 这个文件由CI自动生成，请勿手动修改" > android/local.properties
          echo "# Generated on: $(date)" >> android/local.properties
          # 使用绝对路径
          echo "flutter.sdk=$FLUTTER_HOME" >> android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          
          # 显示环境变量
          echo "FLUTTER_HOME: $FLUTTER_HOME"
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
          
          # 显示文件内容
          cat android/local.properties
      
      - name: 安装Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 7.5
      
      - name: 生成Gradle包装器
        run: |
          cd android
          gradle wrapper --gradle-version 7.5
          ls -la gradle/wrapper/
          chmod +x gradlew
          chmod +x gradlew.bat
      
      - name: 验证Gradle包装器和Flutter路径
        run: |
          echo "=== 验证gradle-wrapper.jar是否存在 ==="
          if [ -f "android/gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "✅ gradle-wrapper.jar 存在"
          else
            echo "❌ gradle-wrapper.jar 不存在"
            exit 1
          fi
          
          echo "=== 验证gradle-wrapper.properties是否存在 ==="
          if [ -f "android/gradle/wrapper/gradle-wrapper.properties" ]; then
            echo "✅ gradle-wrapper.properties 存在"
            cat android/gradle/wrapper/gradle-wrapper.properties
          else
            echo "❌ gradle-wrapper.properties 不存在"
            exit 1
          fi
          
          # 验证Flutter SDK路径
          echo "=== 验证Flutter SDK路径 ==="
          if [ -d "$FLUTTER_HOME/packages/flutter_tools/gradle" ]; then
            echo "✅ Flutter SDK路径正确"
            ls -la $FLUTTER_HOME/packages/flutter_tools/gradle
          else
            echo "❌ Flutter SDK路径不正确"
            exit 1
          fi
          
          # 验证Flutter相关文件
          echo "=== 检查Flutter Gradle文件 ==="
          ls -la $FLUTTER_HOME/packages/flutter_tools/gradle/
          echo ""
          echo "=== 检查app_plugin_loader.gradle文件 ==="
          if [ -f "$FLUTTER_HOME/packages/flutter_tools/gradle/app_plugin_loader.gradle" ]; then
            echo "✅ app_plugin_loader.gradle 存在"
          else
            echo "❌ app_plugin_loader.gradle 不存在，将创建此文件"
            mkdir -p "$FLUTTER_HOME/packages/flutter_tools/gradle"
            # 创建app_plugin_loader.gradle文件
            echo '// 创建一个空的app_plugin_loader.gradle文件，以便在CI环境中构建' > "$FLUTTER_HOME/packages/flutter_tools/gradle/app_plugin_loader.gradle"
            echo '// 这通常由Flutter生成，但在某些CI环境中可能缺失' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/app_plugin_loader.gradle"
            echo '// 本文件只包含最基本的配置' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/app_plugin_loader.gradle"
            echo '' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/app_plugin_loader.gradle"
            echo 'import groovy.json.JsonSlurper' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/app_plugin_loader.gradle"
            echo '' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/app_plugin_loader.gradle"
            echo '// 设置插件依赖' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/app_plugin_loader.gradle"
            echo 'def flutterProjectRoot = rootProject.projectDir.parentFile.toPath()' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/app_plugin_loader.gradle"
            echo '' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/app_plugin_loader.gradle"
            echo '// 加载 .flutter-plugins 文件（如果存在）' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/app_plugin_loader.gradle"
            echo 'def pluginsFile = new File(flutterProjectRoot.toFile(), ".flutter-plugins")' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/app_plugin_loader.gradle"
            echo 'if (pluginsFile.exists()) {' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/app_plugin_loader.gradle"
            echo '    Properties plugins = new Properties()' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/app_plugin_loader.gradle"
            echo '    pluginsFile.withInputStream { stream -> plugins.load(stream) }' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/app_plugin_loader.gradle"
            echo '    plugins.each { name, path ->' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/app_plugin_loader.gradle"
            echo '        def pluginDirectory = flutterProjectRoot.resolve(path).toFile()' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/app_plugin_loader.gradle"
            echo '        def pluginBuildGradle = new File(pluginDirectory, "android/build.gradle")' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/app_plugin_loader.gradle"
            echo '        if (pluginBuildGradle.exists()) {' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/app_plugin_loader.gradle"
            echo '            apply from: pluginBuildGradle' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/app_plugin_loader.gradle"
            echo '        }' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/app_plugin_loader.gradle"
            echo '    }' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/app_plugin_loader.gradle"
            echo '}' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/app_plugin_loader.gradle"
          fi
          
          # 检查flutter.gradle
          echo "=== 检查flutter.gradle文件 ==="
          if [ -f "$FLUTTER_HOME/packages/flutter_tools/gradle/flutter.gradle" ]; then
            echo "✅ flutter.gradle 存在"
          else
            echo "❌ flutter.gradle 不存在，将创建此文件"
            # 创建flutter.gradle文件
            echo '// 创建一个简化的flutter.gradle文件，以便在CI环境中构建' > "$FLUTTER_HOME/packages/flutter_tools/gradle/flutter.gradle"
            echo '// 这通常由Flutter生成，但在某些CI环境中可能缺失' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/flutter.gradle"
            echo '' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/flutter.gradle"
            echo 'buildscript {' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/flutter.gradle"
            echo '    repositories {' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/flutter.gradle"
            echo '        google()' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/flutter.gradle"
            echo '        mavenCentral()' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/flutter.gradle"
            echo '    }' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/flutter.gradle"
            echo '    dependencies {' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/flutter.gradle"
            echo '        classpath "com.android.tools.build:gradle:7.3.0"' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/flutter.gradle"
            echo '    }' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/flutter.gradle"
            echo '}' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/flutter.gradle"
            echo '' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/flutter.gradle"
            echo 'apply plugin: FlutterPlugin' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/flutter.gradle"
            echo '' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/flutter.gradle"
            echo 'class FlutterPlugin implements Plugin<Project> {' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/flutter.gradle"
            echo '    @Override' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/flutter.gradle"
            echo '    void apply(Project project) {' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/flutter.gradle"
            echo '        project.extensions.create("flutter", FlutterExtension)' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/flutter.gradle"
            echo '    }' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/flutter.gradle"
            echo '}' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/flutter.gradle"
            echo '' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/flutter.gradle"
            echo 'class FlutterExtension {' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/flutter.gradle"
            echo '    String source' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/flutter.gradle"
            echo '    ' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/flutter.gradle"
            echo '    // 定义ndkVersion属性，避免构建错误' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/flutter.gradle"
            echo '    String getNdkVersion() {' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/flutter.gradle"
            echo '        return "21.4.7075529"' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/flutter.gradle"
            echo '    }' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/flutter.gradle"
            echo '}' >> "$FLUTTER_HOME/packages/flutter_tools/gradle/flutter.gradle"
          fi
      
      - name: 确保Android目录权限
        run: chmod -R a+x android
          
      - name: 构建调试 APK
        run: flutter build apk --debug
      
      - name: 上传构建的 APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk 