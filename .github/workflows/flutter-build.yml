name: Flutter调试APK构建

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发工作流

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Java 环境
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '11'
      
      - name: 设置 Flutter 环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true
      
      - name: 准备构建环境
        run: |
          # 显示Flutter和Java版本信息
          flutter --version
          java -version
          
          # 接受Android许可证
          yes | flutter doctor --android-licenses || true
          
          # 若存在旧的Android目录则删除
          if [ -d "android" ]; then
            rm -rf android
          fi
          
          # 创建新的Android项目
          flutter create --platforms=android --project-name=thoughtecho --org=com.shangjin .
          
          # 获取依赖
          flutter pub get
      
      - name: 配置Android构建
        run: |
          cd android
          
          # 创建正确的gradle.properties文件
          echo "org.gradle.jvmargs=-Xmx1536M" > gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "android.defaults.buildfeatures.buildconfig=true" >> gradle.properties
          echo "android.nonTransitiveRClass=false" >> gradle.properties
          echo "android.nonFinalResIds=false" >> gradle.properties
          
          # 更新build.gradle文件中的Kotlin版本和SDK版本
          sed -i 's/ext.kotlin_version = \'1.7.10\'/ext.kotlin_version = \'1.9.0\'/' build.gradle
          sed -i 's/compileSdkVersion 33/compileSdkVersion 35/' app/build.gradle
          
          # 确保Gradle包装器正确
          mkdir -p gradle/wrapper
          echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-all.zip" >> gradle/wrapper/gradle-wrapper.properties
          
          # 下载gradle-wrapper.jar
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v7.5.0/gradle/wrapper/gradle-wrapper.jar
          
          # 显示配置文件内容
          echo "gradle.properties:"
          cat gradle.properties
          
          # 设置执行权限
          chmod +x gradlew
      
      - name: 构建调试 APK
        run: flutter build apk --debug
      
      - name: 上传构建的 APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk