name: Flutter调试APK构建

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Java 环境
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17' # 升级到 Java 17

      - name: 设置 Flutter 环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true
      
      - name: 准备构建环境
        run: |
          flutter --version
          java -version
          flutter doctor
          flutter pub get
      - name: 构建调试 APK
          echo "Before gradle-wrapper.properties update:"
          cat gradle/wrapper/gradle-wrapper.properties
          # 更新 Gradle wrapper 配置
          cat > gradle/wrapper/gradle-wrapper.properties << EOF
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.3-all.zip
          EOF
          echo "After gradle-wrapper.properties update:"
          cat gradle/wrapper/gradle-wrapper.properties
          
          # 下载最新的 gradle-wrapper.jar
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/master/gradle/wrapper/gradle-wrapper.jar
          echo "Gradle wrapper download output:"
          ls -la gradle/wrapper/gradle-wrapper.jar
          
          chmod +x gradlew
      - name: 构建调试 APK
        run: |
          flutter clean
          rm -rf ~/.gradle/caches/
          flutter pub cache repair
          flutter build apk --debug
      
      - name: 上传构建的 APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk