name: Firebase note-list performance test

on:
  workflow_dispatch:
    inputs:
      firebase_project:
        description: Google Cloud/Firebase project ID
        required: true
        default: 'thoughtecho-b08bf'
      device_model:
        description: Firebase Test Lab Android model ID
        required: true
        default: MediumPhone.arm
      android_version:
        description: Android version ID
        required: true
        default: '35'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_TEST_LAB_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build Flutter integration-test APKs
        run: |
          flutter pub get
          bash scripts/patch_flutter_quill.sh
          flutter build apk --debug
          pushd android
          ./gradlew app:assembleAndroidTest
          ./gradlew app:assembleDebug \
            -Ptarget="$GITHUB_WORKSPACE/integration_test/note_list_performance_test.dart"
          popd

      - name: Run on Firebase Test Lab
        run: |
          gcloud firebase test android run \
            --project="${{ inputs.firebase_project }}" \
            --type=instrumentation \
            --app=build/app/outputs/apk/debug/app-debug.apk \
            --test=build/app/outputs/apk/androidTest/debug/app-debug-androidTest.apk \
            --device="model=${{ inputs.device_model }},version=${{ inputs.android_version }},locale=zh_CN,orientation=portrait" \
            --timeout=15m \
            --client-details=matrixLabel="ThoughtEcho note-list performance"
