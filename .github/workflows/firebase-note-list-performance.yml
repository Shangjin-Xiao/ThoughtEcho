name: Firebase note-list performance test

on:
  workflow_dispatch:
    inputs:
      firebase_project:
        description: Google Cloud/Firebase project ID
        required: true
        default: 'thoughtecho-b08bf'
      device_model:
        description: Firebase Test Lab Android model ID
        required: true
        default: MediumPhone.arm
      android_version:
        description: Android version ID
        required: true
        default: '35'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_TEST_LAB_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build Flutter integration-test APKs
        run: |
          mkdir -p build/firebase-build-logs

          run_build_with_sqlite_download_retry() {
            local log_file="$1"
            shift

            set +e
            "$@" 2>&1 | tee "$log_file"
            local exit_code=${PIPESTATUS[0]}
            set -e

            if [[ $exit_code -ne 0 ]] &&
              grep -q 'Hash of downloaded file libsqlite3.*expected' "$log_file"; then
              echo "::warning::sqlite3 native asset download failed checksum verification; clearing only its hook cache and retrying once"
              rm -rf \
                "$GITHUB_WORKSPACE/.dart_tool/hooks_runner/sqlite3" \
                "$GITHUB_WORKSPACE/.dart_tool/hooks_runner/shared/sqlite3" \
                "$GITHUB_WORKSPACE/.dart_tool/native_assets" \
                "$GITHUB_WORKSPACE/.dart_tool/native_assets.yaml" \
                "$GITHUB_WORKSPACE/.dart_tool/lib/libsqlite3.so"

              set +e
              "$@" 2>&1 | tee -a "$log_file"
              exit_code=${PIPESTATUS[0]}
              set -e
            fi

            return "$exit_code"
          }

          flutter pub get
          cat >> pubspec.yaml <<'EOF'

          # The image preparation script does not use SQLite. Avoid triggering
          # sqlite3's downloadable native-asset hook before the Android build.
          hooks:
            user_defines:
              sqlite3:
                source: system
          EOF
          dart run scripts/prepare_performance_test_images.dart
          git checkout -- pubspec.yaml
          for image in assets/large_test_{1..5}.jpg; do
            echo "    - $image" >> pubspec.yaml
          done
          cat >> pubspec.yaml <<'EOF'

          # This isolated UI benchmark never opens a database. Keep the test
          # build independent from sqlite3 GitHub release asset availability.
          hooks:
            user_defines:
              sqlite3:
                source: system
          EOF
          bash scripts/patch_flutter_quill.sh
          run_build_with_sqlite_download_retry \
            build/firebase-build-logs/flutter-build-apk.log \
            flutter build apk --debug --target-platform android-arm64
          pushd android
          run_build_with_sqlite_download_retry \
            "$GITHUB_WORKSPACE/build/firebase-build-logs/assemble-android-test.log" \
            ./gradlew --no-parallel app:assembleAndroidTest \
              -Ptarget-platform=android-arm64
          run_build_with_sqlite_download_retry \
            "$GITHUB_WORKSPACE/build/firebase-build-logs/assemble-integration-test.log" \
            ./gradlew --no-parallel app:assembleDebug \
              -Ptarget-platform=android-arm64 \
              -Ptarget="$GITHUB_WORKSPACE/integration_test/note_list_performance_test.dart"
          popd

      - name: Run on Firebase Test Lab
        id: firebase-test
        run: |
          set +e
          gcloud firebase test android run \
            --project="${{ inputs.firebase_project }}" \
            --type=instrumentation \
            --app=build/app/outputs/apk/debug/app-debug.apk \
            --test=build/app/outputs/apk/androidTest/debug/app-debug-androidTest.apk \
            --device="model=${{ inputs.device_model }},version=${{ inputs.android_version }},locale=zh_CN,orientation=portrait" \
            --timeout=15m \
            --client-details=matrixLabel="ThoughtEcho segmented performance" \
            2>&1 | tee firebase-test-run.log
          test_exit=${PIPESTATUS[0]}
          raw_uri=$(sed -n \
            's#.*storage/browser/\([^]]*\)/\{0,1\}\].*#gs://\1#p' \
            firebase-test-run.log | tail -1)
          echo "raw_uri=$raw_uri" >> "$GITHUB_OUTPUT"
          exit "$test_exit"

      - name: Download Firebase Test Lab raw results
        if: always() && steps.firebase-test.outputs.raw_uri != ''
        run: |
          mkdir -p build/firebase-test-lab
          gcloud storage cp --recursive \
            "${{ steps.firebase-test.outputs.raw_uri }}" \
            build/firebase-test-lab/
          find build/firebase-test-lab -depth -name '*:*' | while read -r item; do
            mv "$item" "$(dirname "$item")/$(basename "$item" | tr ':' '_')"
          done

      - name: Extract segmented performance report
        if: always() && steps.firebase-test.outputs.raw_uri != ''
        run: |
          dart run scripts/extract_firebase_performance_results.dart \
            build/firebase-test-lab \
            build/firebase-test-lab/thoughtecho-performance-summary.json

      - name: Print Firebase performance summary
        if: always() && steps.firebase-test.outputs.raw_uri != ''
        run: |
          dart run scripts/summarize_firebase_performance_results.dart \
            build/firebase-test-lab/thoughtecho-performance-summary.json

      - name: Upload Firebase performance diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firebase-performance-${{ github.run_id }}
          path: |
            firebase-test-run.log
            build/firebase-build-logs/
            build/firebase-test-lab/
          if-no-files-found: warn
          retention-days: 30
