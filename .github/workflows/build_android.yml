name: Build and Release Android APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Cache Flutter dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Remove root settings.gradle.kts
        run: rm -f settings.gradle.kts
        
      - name: Check Gradle files
        run: |
          echo "Listing Android directory:"
          ls -la android/
          echo "\nChecking Gradle wrapper:"
          ls -la android/gradle/wrapper/
          echo "\nChecking Gradle properties:"
          cat android/gradle.properties
          
      - name: Generate debug keystore
        run: |
          mkdir -p android/app/
          # Remove existing empty keystore file if it exists
          if [ -f android/app/debug.keystore ]; then
            rm -f android/app/debug.keystore
          fi
          # Generate new keystore
          keytool -genkey -v -keystore android/app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          ls -la android/app/

      - name: Set Gradle properties
        run: |
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxPermSize=512m -XX:+HeapDumpOnOutOfMemoryError" >> android/gradle.properties
          echo "org.gradle.parallel=true" >> android/gradle.properties
          echo "org.gradle.daemon=true" >> android/gradle.properties

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug
          cd ..

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          compression-level: 6
          retention-days: 90